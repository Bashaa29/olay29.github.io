<head><!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">

    <title>Omari Mkombozi | CS Specialist & Forex Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #00d2ff; /* Neon Blue kwa ajili ya accents */
            --dark-navy: #0a192f;   /* Dark Blue ya msingi */
            --light-navy: #112240;  /* Rangi ya kadi */
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: var(--dark-navy);
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--light-navy);
            border: 1px solid rgba(0, 210, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: 0.4s ease;
        }

        .container:hover {
            border-color: var(--primary-blue);
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.1);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary-blue);
            margin-bottom: 20px;
            object-fit: cover;
            padding: 5px;
            background: var(--dark-navy);
        }

        h1 { font-size: 2.2rem; color: #fff; margin-bottom: 5px; font-weight: 600; }
        .tagline { color: var(--primary-blue); font-size: 0.9rem; font-weight: 400; letter-spacing: 1px; margin-bottom: 25px; display: block; }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px;
        }
        .section-header::after { content: ""; height: 1px; background: rgba(136, 146, 176, 0.2); flex: 1; }

        .skills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px; }

        .skill-badge {
            background: rgba(0, 210, 255, 0.05);
            color: var(--primary-blue);
            padding: 5px 14px;
            border-radius: 5px;
            font-size: 0.75rem;
            border: 1px solid rgba(0, 210, 255, 0.2);
            font-weight: 400;
        }

        .links { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: transparent;
            color: var(--primary-blue);
            padding: 14px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid var(--primary-blue);
        }

        .btn:hover {
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-3px);
        }

        .footer { margin-top: 40px; font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="Omari Mkombozi" class="profile-img">

    <div class="section-header">Software Stack</div>
    <div class="skills">
        <span class="skill-badge">C++</span>
        <span class="skill-badge">Python</span>
        <span class="skill-badge">JavaScript</span>
        <span class="skill-badge">PHP</span>
        <span class="skill-badge">HTML/CSS</span>
    </div>

    <div class="section-header">Trading Tools</div>
    <div class="skills">
        <span class="skill-badge">MetaTrader 5 & 4</span>
        <span class="skill-badge">TradingView</span>
        <span class="skill-badge">Risk Mgmt</span>
        <span class="skill-badge">Price Action</span>
    </div>

    <div class="links">
        <a href="https://github.com/bashaa29" target="_blank" class="btn">
            <i class="fab fa-github"></i> Explore My GitHub
        </a>
        <a href="https://wa.me/255677472066" target="_blank" class="btn">

        </a>
        <a href="mailto:omarymkombozi36@gmail.com" class="btn">
            <i class="far fa-envelope"></i> Send an Email
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Omari Mkombozi. Built for Excellence.
    </div>
</div>

</body>
</html>
